name: UI/마스킹 렌더링 문제
description: 마스킹 위치 흔들림, 입력창 표시 문제, placeholder처럼 보이는 문제를 기록합니다.
title: "[UI] "
labels: ["bug", "ui-rendering", "extension"]
body:
  - type: textarea
    id: evidence
    attributes:
      label: 실제 증거
      description: 캡처, 영상, DOM snippet, 브라우저/확대율 정보를 적습니다.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: 발생 영역
      options:
        - 검색창/input/textarea
        - 일반 텍스트 노드
        - Google 결과 카드
        - YouTube 댓글
        - Android YouTube 제목/카드
        - Android overlay
        - popup/options
        - 기타
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      placeholder: "예: 입력창 *** fixed-token UI가 흔들리지 않음"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      placeholder: "예: 스크롤 후 위치 어긋남, sensitivity 변경 후 깜빡임"
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 제약 사항
      value: "- 입력창 fixed-token UX는 안정화 기준으로 보호\n- 일반 DOM은 exact span wrapper만 사용\n- UI 변경은 별도 PR로 검증"
  - type: dropdown
    id: constraint-code
    attributes:
      label: 제약 분류 코드
      description: docs/constraints-and-decisions.md의 C1~C8 기준입니다.
      multiple: true
      options:
        - C1 서비스 차별성
        - C2 Backend 계약/모델
        - C3 후보 수집/플랫폼 DOM
        - C4 실시간성/비동기
        - C5 마스킹 UI/렌더링
        - C6 설정/민감도/캐시
        - C7 Android 접근성/OCR
        - C8 검증/운영 환경
    validations:
      required: true
  - type: textarea
    id: cause-notes
    attributes:
      label: 원인 분해 메모
      placeholder: "예: Android는 DOM span이 불가능해 좌표 overlay만 가능하고, composite bounds를 그대로 쓰면 카드 전체가 가려짐"
  - type: textarea
    id: report-note
    attributes:
      label: 보고서 반영 메모
      placeholder: "예: 플랫폼별 렌더링 제약 때문에 Chrome DOM span과 Android coordinate overlay를 분리해 관리함"
