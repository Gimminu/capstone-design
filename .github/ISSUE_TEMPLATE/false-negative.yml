name: 미탐 신고
description: 유해 문맥인데 마스킹되지 않거나 너무 늦게 반영된 사례를 기록합니다.
title: "[미탐] "
labels: ["bug", "false-negative", "needs-regression"]
body:
  - type: textarea
    id: evidence
    attributes:
      label: 실제 증거
      description: URL, 캡처, 콘솔 로그, backend 응답 등 재현 근거를 적습니다.
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: 입력 문장 또는 화면 텍스트
      description: 문장 전체와 문제가 된 단어를 함께 적습니다.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      placeholder: "예: 유해 span만 즉시 마스킹"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      placeholder: "예: 마스킹 없음, 새로고침 후에만 적용, 1초 이상 지연"
    validations:
      required: true
  - type: dropdown
    id: source-area
    attributes:
      label: 발생 영역
      options:
        - Google 검색창
        - Google 검색 결과
        - Google AI 개요
        - YouTube 댓글
        - Android YouTube 제목/카드
        - Android YouTube 검색창
        - Android 이미지/썸네일 내부 텍스트
        - 일반 웹 페이지
        - Backend 직접 호출
        - 기타
  - type: dropdown
    id: likely-cause
    attributes:
      label: 의심 원인
      description: 정확하지 않아도 됩니다. 이후 PR에서 실제 원인을 갱신합니다.
      multiple: true
      options:
        - Backend 모델/후처리
        - Evidence span 없음
        - 후보 수집 누락
        - foreground/reconcile 지연
        - 캐시 또는 stale response
        - 설정/민감도 반영
        - Android 접근성 트리
        - OCR이 필요한 이미지 내부 텍스트
        - 기타
  - type: textarea
    id: cause-notes
    attributes:
      label: 원인 분해 메모
      placeholder: "예: YouTube 제목이 text node가 아니라 contentDescription 안에만 존재함"
  - type: dropdown
    id: constraint-code
    attributes:
      label: 제약 분류 코드
      description: docs/constraints-and-decisions.md의 C1~C8 기준입니다.
      multiple: true
      options:
        - C1 서비스 차별성
        - C2 Backend 계약/모델
        - C3 후보 수집/플랫폼 DOM
        - C4 실시간성/비동기
        - C5 마스킹 UI/렌더링
        - C6 설정/민감도/캐시
        - C7 Android 접근성/OCR
        - C8 검증/운영 환경
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: 검증 계획
      placeholder: "예: regression case 추가, popup latency 확인, backend 직접 비교"
  - type: textarea
    id: report-note
    attributes:
      label: 보고서 반영 메모
      description: 이 사례가 어떤 제약/개선 근거가 되는지 한두 줄로 적습니다.
      placeholder: "예: 접근성 API만으로는 썸네일 내부 텍스트를 얻을 수 없어 OCR이 후속 과제로 분리됨"
