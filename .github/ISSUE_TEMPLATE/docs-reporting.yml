name: 문서/보고서 근거 정리
description: 교수님 보고서에 반영할 개발 이력, 제약, 검증 내용을 정리합니다.
title: "[문서] "
labels: ["documentation", "reporting"]
body:
  - type: textarea
    id: problem
    attributes:
      label: 문제
      placeholder: "어떤 문제를 관찰했는지 적습니다."
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: 참고 근거
      placeholder: "PR, 이슈, 캡처, 테스트 결과, 로그"
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 제약 사항
      placeholder: "유지해야 했던 API, UX, 팀 작업 범위"
    validations:
      required: true
  - type: dropdown
    id: constraint-code
    attributes:
      label: 제약 분류 코드
      description: docs/constraints-and-decisions.md의 C1~C8 기준입니다.
      multiple: true
      options:
        - C1 서비스 차별성
        - C2 Backend 계약/모델
        - C3 후보 수집/플랫폼 DOM
        - C4 실시간성/비동기
        - C5 마스킹 UI/렌더링
        - C6 설정/민감도/캐시
        - C7 Android 접근성/OCR
        - C8 검증/운영 환경
    validations:
      required: true
  - type: textarea
    id: cause-breakdown
    attributes:
      label: 원인 분해
      placeholder: "모델/후처리, 후보 수집, 렌더링, 네트워크, 설정 race, 플랫폼 접근성/OCR 중 어디 문제였는지 적습니다."
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: 선택한 해결책
      placeholder: "왜 이 방식이 적절했는지 함께 적습니다."
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: 검증
      placeholder: "자동 테스트, 직접 호출, 실제 브라우저 확인"
    validations:
      required: true
  - type: dropdown
    id: result
    attributes:
      label: 결과
      options:
        - 해결
        - 부분 해결
        - 보류
        - 재현 필요
    validations:
      required: true
  - type: textarea
    id: remaining-risk
    attributes:
      label: 남은 과제
      placeholder: "아직 검증하지 못한 환경, 남은 오탐/미탐, 후속 PR 범위"
