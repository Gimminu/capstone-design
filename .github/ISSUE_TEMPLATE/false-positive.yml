name: 오탐 신고
description: 정상 문맥인데 마스킹되거나 유해로 판정된 사례를 기록합니다.
title: "[오탐] "
labels: ["bug", "false-positive", "needs-regression"]
body:
  - type: textarea
    id: evidence
    attributes:
      label: 실제 증거
      description: URL, 캡처, 콘솔 로그, backend 응답 등 재현 근거를 적습니다.
      placeholder: "예: Google 검색 URL, 캡처 파일, /analyze_batch 응답"
    validations:
      required: true
  - type: textarea
    id: input
    attributes:
      label: 입력 문장 또는 화면 텍스트
      description: 가능하면 문장 전체를 그대로 적습니다.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 기대 결과
      placeholder: "예: safe 유지, 마스킹 없음"
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 실제 결과
      placeholder: "예: 특정 span이 마스킹됨, 카드 일부가 늦게 가려짐"
    validations:
      required: true
  - type: dropdown
    id: likely-cause
    attributes:
      label: 의심 원인
      description: 정확하지 않아도 됩니다. 이후 PR에서 실제 원인을 갱신합니다.
      multiple: true
      options:
        - Backend 모델/후처리
        - Evidence span 산출
        - 후보 수집/컨테이너 병합
        - 렌더링/마스킹 UI
        - 캐시 또는 stale response
        - 설정/민감도 반영
        - Android 접근성 트리
        - OCR이 필요한 이미지 내부 텍스트
        - 기타
  - type: textarea
    id: cause-notes
    attributes:
      label: 원인 분해 메모
      placeholder: "예: 정상 UI 단어인데 span으로 채택됨, safe-context가 늦게 적용됨"
  - type: dropdown
    id: constraint-code
    attributes:
      label: 제약 분류 코드
      description: docs/constraints-and-decisions.md의 C1~C8 기준입니다.
      multiple: true
      options:
        - C1 서비스 차별성
        - C2 Backend 계약/모델
        - C3 후보 수집/플랫폼 DOM
        - C4 실시간성/비동기
        - C5 마스킹 UI/렌더링
        - C6 설정/민감도/캐시
        - C7 Android 접근성/OCR
        - C8 검증/운영 환경
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: 제약 사항
      value: "- `/analyze_batch` 계약 유지\n- exact span만 마스킹\n- frontend 단독 금칙어 차단 금지"
  - type: textarea
    id: validation
    attributes:
      label: 검증 계획
      placeholder: "예: backend regression 추가, 실제 Google 화면 재확인"
  - type: textarea
    id: report-note
    attributes:
      label: 보고서 반영 메모
      description: 이 사례가 어떤 제약/개선 근거가 되는지 한두 줄로 적습니다.
      placeholder: "예: 단순 금칙어 차단은 문맥 오탐을 만들 수 있어 safe-context 후처리가 필요했음"
